name: Build ReactX

on:
  push:
    branches: [main]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build ReactX
        run: npm run build:react

      - name: Concatenate compiled JS files
        run: python scripts/concat-reactx.py

      - name: Upload final browser bundle
        uses: actions/upload-artifact@v4
        with:
          name: react-app-js
          path: webapp/static/react/app.js
